<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HBD PAGGGUU 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&family=Pacifico&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#ffc1cc,#e0bbff);
    text-align:center;
    color:white;
    overflow:hidden;
}

 #message{
  white-space: pre-line;
  padding: 10px;
}
/* intro */
#intro{
    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(135deg,#ffc1cc,#e0bbff);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:10;
    font-family:'Pacifico';
    font-size:1.5rem;
}

/* message */
#message{
  white-space: pre-line;
  padding: 10px;
}

/* title */
h1{
    font-family:'Pacifico';
    margin-top:30px;
}

/* image */
#slide{
    width:280px;
    height:350px;
    object-fit:cover;
    border-radius:20px;
    margin-top:20px;
}

/* button */
button{
    padding:12px 25px;
    border:none;
    border-radius:25px;
    background:white;
    color:#ff4d6d;
    font-weight:bold;
    margin-top:20px;
}

/* popup */
#popup{
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
}
.popup-content{
    background:white;
    color:black;
    padding:20px;
    border-radius:15px;
}

/* confetti */
.confetti{
    position:absolute;
    animation:fall linear infinite;
}
@keyframes fall{
    0%{transform:translateY(-100vh)}
    100%{transform:translateY(100vh)}
}

/* hearts */
.heart{
    position:absolute;
    font-size:20px;
    animation:float 5s linear infinite;
}
@keyframes float{
    0%{transform:translateY(100vh)}
    100%{transform:translateY(-10vh)}
}

/* fade */
@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}
</style>
</head>

<body>

<div id="intro" onclick="startSite()">Tap anywhere 💖</div>

<h1>Happpyyy Birthdayyy Pondatti 💖✨</h1>

<p id="message"></p>

<button onclick="showPopup()">Surprise 🎁</button>

<br>
<img id="slide" src="img1.jpg">

<audio id="music" src="song.mp3"></audio>

<div id="popup">
  <div class="popup-content">
    <h2>🎉 Surprise 💖</h2>
    <p>I’d choose you in every lifetime to be my bestf, so lucky to have you in my life 😭💕</p>
    <button onclick="closePopup()">Close</button>
  </div>
</div>

<script>

/* message typing */
let text= let text=let text=`Happy Birthday to the girl who lights up everyone’s life by just being in it 💫✨

From school drama to adulting, you've come a long way. I'm so proud of you 🥺💖

You're my safe place, forever favourite. I LOVE YOU TO THE MOON AND BACK 💞

It’s always gonna be us over anyone and everyone 💖`;
let i=0;
function typeText(){
    if(i<text.length){
        document.getElementById("message").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeText,25);
    }
}
typeText();

/* slideshow */
const images=["img1.jpg","img2.jpg","img3.jpg","img4.jpg","img5.jpg","img6.jpg","img7.jpg"];
let index=0;

function startSlideshow(){
    setInterval(()=>{
        index=(index+1)%images.length;
        document.getElementById("slide").src=images[index];
    },1800);
}

/* confetti */
function createConfetti(){
    for(let i=0;i<600;i++){
        let div=document.createElement("div");
        div.className="confetti";
        div.style.left=Math.random()*100+"vw";
        div.style.background=`hsl(${Math.random()*360},100%,50%)`;
        div.style.width=(Math.random()*6+4)+"px";
        div.style.height=div.style.width;
        div.style.animationDuration=(Math.random()*3+2)+"s";
        document.body.appendChild(div);
    }
}

/* hearts */
function createHearts(){
    setInterval(()=>{
        let heart=document.createElement("div");
        heart.className="heart";
        heart.innerHTML="💖";
        heart.style.left=Math.random()*100+"vw";
        document.body.appendChild(heart);
        setTimeout(()=>heart.remove(),5000);
    },400);
}

/* sparkle name */
function showSparkleName(){
    const sparkle=document.createElement("div");
    sparkle.innerText="Pragna ✨";
    sparkle.style.position="fixed";
    sparkle.style.top="50%";
    sparkle.style.left="50%";
    sparkle.style.transform="translate(-50%,-50%)";
    sparkle.style.fontSize="2.2rem";
    sparkle.style.fontFamily="Pacifico";
    sparkle.style.textShadow="0 0 20px #fff,0 0 40px #ff69b4";
    sparkle.style.zIndex="25";
    sparkle.style.animation="fadeIn 1s ease";
    document.body.appendChild(sparkle);

    setTimeout(()=>sparkle.remove(),2500);
}

/* ending */
function showEnding(){
    const ending=document.createElement("div");
    ending.style.position="fixed";
    ending.style.top="0";
    ending.style.left="0";
    ending.style.width="100%";
    ending.style.height="100%";
    ending.style.background="linear-gradient(135deg,#ffc1cc,#e0bbff)";
    ending.style.display="flex";
    ending.style.justifyContent="center";
    ending.style.alignItems="center";
    ending.style.flexDirection="column";
    ending.style.zIndex="20";
    ending.style.animation="fadeIn 1s ease";

    ending.innerHTML=`
        <h1 style="font-family:Pacifico;">From Aditi 💌</h1>
        <p>Forever your person 💖</p>
    `;
    document.body.appendChild(ending);
}

/* start site */
function startSite(){
    document.getElementById("intro").style.display="none";

    let music=document.getElementById("music");
    music.currentTime=75;
    music.play();

    setTimeout(()=>{
        music.pause();
        showSparkleName();

        setTimeout(()=>{
            showEnding();
        },2500);

    },16000);

    createConfetti();
    createHearts();
    startSlideshow();
}

/* popup */
function showPopup(){
    document.getElementById("popup").style.display="flex";
}
function closePopup(){
    document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
