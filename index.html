<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Pragna 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&family=Pacifico&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#ffc1cc,#e0bbff);
    text-align:center;
    color:white;
    overflow:hidden;
}

/* TITLE */
h1{
    font-family:'Pacifico';
    font-size:2rem;
    margin-top:40px;
}

/* IMAGE */
#slide{
    width:280px;
    height:350px;
    object-fit:cover;
    border-radius:20px;
    margin-top:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* BUTTON */
button{
    padding:12px 25px;
    border:none;
    border-radius:25px;
    background:white;
    color:#ff4d6d;
    font-weight:bold;
    cursor:pointer;
    margin-top:20px;
}

/* CONFETTI */
.confetti{
    position:absolute;
    width:8px;height:8px;
    background:red;
    animation:fall linear infinite;
}
@keyframes fall{
    0%{transform:translateY(-100vh)}
    100%{transform:translateY(100vh)}
}

/* HEARTS */
.heart{
    position:absolute;
    color:#ff4d6d;
    font-size:20px;
    animation:float 5s linear infinite;
}
@keyframes float{
    0%{transform:translateY(100vh)}
    100%{transform:translateY(-10vh)}
}

/* POPUP */
#popup{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
}
.popup-content{
    background:white;
    color:black;
    padding:20px;
    border-radius:15px;
}
</style>
</head>

<body>

<h1>Happy Birthday My Pondatti 💖✨</h1>

<p id="message"></p>

<button onclick="startCelebration()">Celebrate 🎉</button>

<br>
<img id="slide" src="img1.jpg">

<audio id="music" src="song.mp3"></audio>

<div id="popup">
  <div class="popup-content">
    <h2>🎉 SURPRISE 💖</h2>
    <p>You’re my forever person 🥺✨</p>
    <button onclick="closePopup()">Close</button>
  </div>
</div>

<script>

/* TYPING MESSAGE */
let text="Happy Birthday to the girl who's been my home since school 💫✨\nWe grew up together... same chaos, same memories 🥺💖\nYou’re my safe place, forever person 💕";
let i=0;
function typeText(){
    if(i<text.length){
        document.getElementById("message").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeText,30);
    }
}
typeText();

/* IMAGES */
const images=["img1.jpg","img2.jpg","img3.jpg","img4.jpg","img5.jpg","img6.jpg","img7.jpg"];
let index=0;

/* SLIDESHOW (BEAT SYNC ~1.8s) */
function startSlideshow(){
    setInterval(()=>{
        index=(index+1)%images.length;
        document.getElementById("slide").src=images[index];
    },1800);
}

/* CONFETTI */
function createConfetti(){
    for(let i=0;i<300;i++){
        let div=document.createElement("div");
        div.className="confetti";
        div.style.left=Math.random()*100+"vw";
        div.style.background=`hsl(${Math.random()*360},100%,50%)`;
        div.style.animationDuration=(Math.random()*3+2)+"s";
        document.body.appendChild(div);
    }
}

/* HEARTS */
function createHearts(){
    setInterval(()=>{
        let heart=document.createElement("div");
        heart.className="heart";
        heart.innerHTML="💖";
        heart.style.left=Math.random()*100+"vw";
        document.body.appendChild(heart);
        setTimeout(()=>heart.remove(),5000);
    },500);
}

/* MAIN START */
function startCelebration(){
    let music=document.getElementById("music");

    music.currentTime=75; // 1:15
    music.play();

    setTimeout(()=>music.pause(),16000); // till 1:31

    createConfetti();
    createHearts();
    startSlideshow();

    document.getElementById("popup").style.display="flex";
}

/* CLOSE POPUP */
function closePopup(){
    document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
