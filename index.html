<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Pragna 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&family=Pacifico&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#ffc1cc,#ffe4e1,#e0bbff);
    text-align:center;
    color:white;
    overflow:hidden;
}

/* intro */
#intro {
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Pacifico';
    font-size:26px;
    z-index:10;
}

/* main */
#main {
    display:none;
    padding-top:25px;
    position:relative;
    z-index:2; /* text above confetti */
}

h1 {
    font-family:'Pacifico';
    font-size:24px;
}

#message {
    max-width:90%;
    margin:auto;
    line-height:1.6;
    white-space:pre-line;
    font-size:15px;
}

/* button */
button {
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:white;
    color:#ff4d6d;
    font-weight:bold;
}

/* slideshow */
#slideshow {
    width:80%;
    max-width:300px;
    height:420px;
    margin:20px auto;
    position:relative;
    overflow:hidden;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

#slideshow img {
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center 20%; /* 🔥 face fix */
    position:absolute;
    opacity:0;
    transform:scale(1); /* 🔥 no zoom crop */
    transition:opacity 1s ease;
}

/* confetti */
.confetti {
    position:fixed;
    top:-10px;
    border-radius:50%;
    animation:fall linear infinite;
    z-index:1;
}

@keyframes fall {
    to { transform:translateY(110vh) rotate(360deg); }
}

/* popup */
#popup {
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    color:#ff4d6d;
    padding:20px;
    border-radius:15px;
    font-weight:bold;
}

/* ending */
.fadeIn {
    animation:fadeIn 1.5s ease;
}

@keyframes fadeIn {
    from{opacity:0;}
    to{opacity:1;}
}
</style>
</head>

<body>

<div id="intro">Tap anywhere 💖</div>

<div id="main">
    <h1>Happy Birthday My Pondatti 💖✨</h1>

    <p id="message"></p>

    <button onclick="showSurprise()">Surprise 🎁</button>

    <div id="slideshow">
        <img src="img1.jpg">
        <img src="img2.jpg">
        <img src="img3.jpg">
        <img src="img4.jpg">
        <img src="img5.jpg">
        <img src="img6.jpg">
        <img src="img7.jpg">
    </div>
</div>

<div id="popup">I LOVE YOU SO MUCH 💖</div>

<audio id="song" src="song.mp3"></audio>
<audio id="heartbeat" src="https://www.soundjay.com/human/heartbeat-01a.mp3"></audio>

<script>

/* START */
document.addEventListener("click", startExperience, { once:true });

function startExperience(){
    document.getElementById("intro").style.display="none";
    document.getElementById("main").style.display="block";

    startAudio();
    startSlideshow();
    typeMessage();
}

/* AUDIO */
function startAudio(){
    let song=document.getElementById("song");
    let beat=document.getElementById("heartbeat");

    song.currentTime=75;
    song.volume=1;
    beat.volume=0.5;

    song.play().catch(()=>{});
    beat.play().catch(()=>{});

    setTimeout(()=>{
        let fade=setInterval(()=>{
            if(song.volume>0.05){
                song.volume-=0.05;
                beat.volume-=0.05;
            } else {
                song.pause();
                beat.pause();
                clearInterval(fade);
            }
        },200);
    },14000);
}

/* MESSAGE */
let text=`Happy Birthday to the girl who lights up everyone's life just by being in it ✨💫

From school drama to adulting, you've come a long way. I'm so proud of you 😭💖

You're my safe place, my forever favourite. I LOVE YOU TO THE MOON AND BACK 💕

It's always gonna be us over anyone and everyone 💞`;

let i=0;

function typeMessage(){
    function type(){
        if(i<text.length){
            document.getElementById("message").innerHTML+=text.charAt(i);
            i++;
            setTimeout(type,30);
        }
    }
    type();
}

/* SLIDESHOW */
let images=document.querySelectorAll("#slideshow img");
let index=0;

function startSlideshow(){
    images[0].style.opacity=1;

    let interval=setInterval(()=>{
        images[index].style.opacity=0;

        index++;

        if(index>=images.length){
            clearInterval(interval);
            endExperience();
            return;
        }

        images[index].style.opacity=1;
    },3000);
}

/* 🎉 CONFETTI BURST (ONLY ON CLICK) */
function showSurprise(){
    let p=document.getElementById("popup");
    p.style.display="block";

    burstConfetti(); // 🔥 trigger here

    setTimeout(()=>p.style.display="none",3000);
}

function burstConfetti(){
    for(let i=0;i<120;i++){ // 🔥 burst effect
        let c=document.createElement("div");
        c.className="confetti";

        c.style.left=Math.random()*100+"vw";

        let size=5+Math.random()*6;
        c.style.width=size+"px";
        c.style.height=size+"px";

        c.style.background=`hsl(${Math.random()*360},100%,60%)`;

        c.style.animationDuration=(1+Math.random()*2)+"s";

        document.body.appendChild(c);

        setTimeout(()=>c.remove(),3000);
    }
}

/* END */
function endExperience(){
    setTimeout(()=>{
        document.body.innerHTML=`
        <div class="fadeIn" style="
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            font-family:Pacifico;
            font-size:35px;
            background:linear-gradient(135deg,#ffc1cc,#e0bbff);
            color:white;
        ">
            I LOVE YOU 💖
            <span style="font-size:18px;margin-top:10px;">— Aditi ✨</span>
        </div>`;
    },2000);
}

</script>

</body>
</html>
