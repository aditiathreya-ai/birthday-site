<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Pragna 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&family=Pacifico&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #ffc1cc, #ffe4e1, #e0bbff);
    text-align:center;
    color:white;
    overflow:hidden;
}

/* intro */
#intro {
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Pacifico';
    font-size:28px;
}

/* main */
#main {
    display:none;
    padding-top:60px;
}

h1 {
    font-family:'Pacifico';
    font-size:40px;
}

p {
    max-width:600px;
    margin:auto;
    line-height:1.6;
    white-space:pre-line;
}

button {
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:20px;
    background:white;
    color:#ff4d6d;
    font-weight:bold;
    cursor:pointer;
}

/* images */
#slideshow {
    margin-top:30px;
}

#slideshow img {
    width:250px;
    border-radius:15px;
    display:none;
}

/* confetti */
.confetti {
    position:fixed;
    width:8px;
    height:8px;
    background:red;
    animation:fall linear infinite;
}

@keyframes fall {
    to {
        transform:translateY(100vh);
    }
}

/* popup */
#popup {
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    background:white;
    color:#ff4d6d;
    padding:20px;
    border-radius:15px;
    font-weight:bold;
}

</style>
</head>

<body>

<div id="intro">Tap anywhere 💖</div>

<div id="main">
    <h1>Happpyyy Birthdayyy Pondatti 💖✨</h1>

    <p id="message"></p>

    <button onclick="showSurprise()">Surprise 🎁</button>

    <div id="slideshow">
        <img src="img1.jpg">
        <img src="img2.jpg">
        <img src="img3.jpg">
        <img src="img4.jpg">
        <img src="img5.jpg">
        <img src="img6.jpg">
        <img src="img7.jpg">
    </div>
</div>

<div id="popup">I LOVE YOU SO MUCH 💖</div>

<audio id="song" src="song.mp3"></audio>

<script>

/* START EXPERIENCE */
document.addEventListener("click", function () {
    startExperience();
}, { once: true });

function startExperience() {
    document.getElementById("intro").style.display = "none";
    document.getElementById("main").style.display = "block";

    let audio = document.getElementById("song");
    audio.currentTime = 75; // 1:15
    audio.play().catch(()=>{});

    setTimeout(()=>{
        audio.pause();
    },16000); // till 1:31

    startSlideshow();
    startConfetti();
    typeMessage();
}

/* TYPE MESSAGE */
let text = `Happy Birthday to the girl who lights up everyone's life just by being in it ✨💫
From school drama to adulting, you've come a long way. I'm so proud of you 😭💖
You're my safe place, my forever favourite. I LOVE YOU TO THE MOON AND BACK 💕
It's always gonna be us over anyone and everyone 💞

— Aditi 💖`;

let i = 0;
function typeMessage() {
    if (i < text.length) {
        document.getElementById("message").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeMessage, 30);
    }
}

/* SLIDESHOW */
let images = document.querySelectorAll("#slideshow img");
let index = 0;

function startSlideshow() {
    images[0].style.display = "block";

    setInterval(()=>{
        images[index].style.display="none";
        index = (index+1)%images.length;
        images[index].style.display="block";
    },2000);
}

/* CONFETTI */
function startConfetti() {
    setInterval(()=>{
        for(let i=0;i<10;i++){
            let confetti = document.createElement("div");
            confetti.className="confetti";
            confetti.style.left=Math.random()*100+"vw";
            confetti.style.background=`hsl(${Math.random()*360},100%,70%)`;
            confetti.style.animationDuration=(2+Math.random()*3)+"s";
            document.body.appendChild(confetti);

            setTimeout(()=>confetti.remove(),5000);
        }
    },300);
}

/* SURPRISE */
function showSurprise() {
    let pop = document.getElementById("popup");
    pop.style.display="block";

    setTimeout(()=>{
        pop.style.display="none";
    },3000);
}

</script>

</body>
</html>
